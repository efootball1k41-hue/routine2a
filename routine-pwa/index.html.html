<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Routine 2A">
<title>2A Batch Routine</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --card: #16161f;
  --border: #1e1e2e;
  --accent: #7c3aed;
  --accent2: #06b6d4;
  --accent3: #f59e0b;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #2a2a3e;
  --green: #10b981;
  --red: #ef4444;
  --test-color: #f97316;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  padding-top: var(--safe-top);
}
body::before {
  content:'';
  position:fixed; top:-50%; left:-50%; width:200%; height:200%;
  background: radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.04) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}
.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 16px calc(80px + var(--safe-bottom));
  position: relative; z-index: 1;
}

/* HEADER */
.header {
  padding: 20px 0 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.profile-section { display:flex; align-items:center; gap:12px; }
.profile-pic {
  width:48px; height:48px; border-radius:50%;
  border:2px solid var(--accent);
  background: var(--card);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; position:relative; flex-shrink:0; cursor:pointer;
}
.profile-pic img { width:100%; height:100%; object-fit:cover; display:none; }
.profile-pic .ph { font-size:20px; color:var(--text-muted); }
.profile-info h1 { font-size:16px; font-weight:700; }
.profile-info p { font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }
.date-badge { text-align:right; }
.date-badge .day-name { font-size:13px; font-weight:800; color:var(--accent); letter-spacing:.05em; text-transform:uppercase; }
.date-badge .date-str { font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }

/* INSTALL BANNER */
.install-banner {
  background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(6,182,212,0.08));
  border:1px solid rgba(124,58,237,0.3);
  border-radius:14px; padding:12px 14px;
  margin-bottom:14px;
  display:flex; align-items:center; gap:10px;
  cursor:pointer;
}
.install-banner .ib-icon { font-size:22px; flex-shrink:0; }
.install-banner .ib-text { flex:1; font-size:12px; color:var(--text); line-height:1.5; }
.install-banner .ib-text strong { color:var(--accent); }
.install-banner .ib-close { color:var(--text-muted); font-size:18px; padding:4px; }

/* NOTIF REQUEST */
.notif-request-btn {
  width:100%; background:rgba(245,158,11,0.08);
  border:1px dashed rgba(245,158,11,0.3);
  border-radius:12px; padding:11px 14px;
  color:var(--accent3); font-size:12px; font-weight:600;
  font-family:'Syne',sans-serif; cursor:pointer;
  display:flex; align-items:center; gap:8px;
  margin-bottom:14px; transition:all .2s;
}
.notif-request-btn:hover { background:rgba(245,158,11,0.12); }

/* DAY SELECTOR */
.day-selector {
  display:flex; gap:6px; margin-bottom:16px;
  overflow-x:auto; padding-bottom:4px; scrollbar-width:none;
}
.day-selector::-webkit-scrollbar { display:none; }
.day-btn {
  flex-shrink:0; padding:8px 14px; border-radius:20px;
  border:1px solid var(--border); background:var(--surface);
  color:var(--text-muted); font-family:'Syne',sans-serif;
  font-size:12px; font-weight:600; cursor:pointer; transition:all .2s;
}
.day-btn:hover { border-color:var(--accent); color:var(--text); }
.day-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.day-btn.today-marker { border-color:var(--accent2); color:var(--accent2); }
.day-btn.today-marker.active { background:var(--accent2); border-color:var(--accent2); color:#000; }

/* STATUS BAR */
.status-bar { display:flex; gap:10px; margin-bottom:16px; }
.stat-card {
  flex:1; background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:12px 14px;
}
.stat-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; font-family:'JetBrains Mono',monospace; }
.stat-val { font-size:22px; font-weight:800; margin-top:4px; }
.stat-val span { font-size:12px; font-weight:400; color:var(--text-muted); }

/* DAY HEADER */
.day-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.day-title { font-size:22px; font-weight:800; }
.room-badge {
  font-size:11px; font-family:'JetBrains Mono',monospace;
  color:var(--accent2); background:rgba(6,182,212,0.08);
  border:1px solid rgba(6,182,212,0.2); padding:4px 10px; border-radius:20px;
}

/* CLASS CARD */
.class-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:16px; margin-bottom:12px;
  position:relative; overflow:hidden; transition:all .25s;
  animation: slideUp .3s ease forwards;
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}
.class-card:nth-child(1) { animation-delay:.0s; }
.class-card:nth-child(2) { animation-delay:.06s; }
.class-card:nth-child(3) { animation-delay:.12s; }
.class-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:var(--accent); border-radius:3px 0 0 3px;
}
.class-card.attended { background:rgba(16,185,129,0.04); }
.class-card.attended::before { background:var(--green); }
.class-card.missed { background:rgba(239,68,68,0.04); opacity:.75; }
.class-card.missed::before { background:var(--red); }
.class-card.has-test::before { background:var(--test-color); }

/* CLASS TOP */
.class-top { display:flex; align-items:flex-start; gap:12px; }
.teacher-pic {
  width:48px; height:48px; border-radius:12px;
  background:var(--surface); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0; cursor:pointer; position:relative;
}
.teacher-pic img { width:100%; height:100%; object-fit:cover; display:none; }
.teacher-initials { font-size:13px; font-weight:800; color:var(--accent); }
.teacher-pic::after {
  content:'📷'; position:absolute; inset:0;
  background:rgba(0,0,0,0); display:flex; align-items:center;
  justify-content:center; font-size:18px; border-radius:12px;
  opacity:0; transition:all .2s;
}
.teacher-pic:hover::after { background:rgba(0,0,0,0.65); opacity:1; }

.class-info { flex:1; min-width:0; }
.class-code { font-size:19px; font-weight:800; line-height:1; }
.class-teacher { font-size:11px; color:var(--text-muted); margin-top:3px; font-family:'JetBrains Mono',monospace; }
.class-time { font-size:11px; color:var(--accent2); margin-top:4px; font-weight:600; font-family:'JetBrains Mono',monospace; }

/* ATTENDANCE CONTROLS */
.attend-controls { display:flex; flex-direction:column; gap:5px; align-items:flex-end; }
.attend-btn {
  width:36px; height:36px; border-radius:10px;
  border:1px solid var(--border); background:var(--surface);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:16px; transition:all .2s;
}
.attend-btn.attended { background:rgba(16,185,129,0.15); border-color:var(--green); }
.attend-btn.missed { background:rgba(239,68,68,0.15); border-color:var(--red); }
.attend-count {
  font-size:10px; font-family:'JetBrains Mono',monospace;
  color:var(--text-muted); text-align:center; white-space:nowrap;
}

/* PER-COURSE ATTENDANCE BAR */
.course-att-bar {
  margin-top:10px; padding-top:10px;
  border-top:1px solid var(--border);
}
.course-att-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.course-att-label { font-size:10px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; min-width:28px; }
.bar-wrap { flex:1; height:5px; background:var(--border); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; background:var(--green); transition:width .5s ease; }
.bar-fill.warn { background:var(--red); }
.bar-fill.ok { background:var(--accent3); }
.bar-pct { font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--text-muted); min-width:28px; text-align:right; }

/* TEST BADGE */
.test-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:10px; font-weight:700; color:var(--test-color);
  background:rgba(249,115,22,0.1); border:1px solid rgba(249,115,22,0.3);
  padding:3px 8px; border-radius:20px; margin-top:6px; margin-right:4px;
}
.test-badge .del-test {
  font-size:12px; cursor:pointer; color:var(--text-muted);
  margin-left:2px; line-height:1;
}

/* NOTES */
.notes-section { margin-top:10px; border-top:1px solid var(--border); padding-top:10px; }
.notes-toggle {
  display:flex; align-items:center; gap:6px;
  font-size:11px; color:var(--text-muted);
  cursor:pointer; background:none; border:none;
  font-family:'Syne',sans-serif; transition:color .2s;
}
.notes-toggle:hover { color:var(--accent); }
.notes-input {
  width:100%; background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:8px 12px; color:var(--text);
  font-family:'Noto Sans Bengali',sans-serif; font-size:13px;
  resize:none; outline:none; transition:border-color .2s;
  min-height:60px; margin-top:8px;
}
.notes-input::placeholder { color:var(--text-dim); }
.notes-input:focus { border-color:var(--accent); }

/* ADD TEST */
.add-test-btn {
  display:flex; align-items:center; gap:6px;
  font-size:11px; font-weight:600; color:var(--text-muted);
  background:none; border:1px dashed var(--border);
  border-radius:8px; padding:5px 10px; cursor:pointer;
  transition:all .2s; margin-top:8px; font-family:'Syne',sans-serif;
}
.add-test-btn:hover { border-color:var(--test-color); color:var(--test-color); }

/* TEST FORM */
.test-form {
  display:none; margin-top:10px; background:var(--surface);
  border:1px solid rgba(249,115,22,0.2); border-radius:12px; padding:12px;
}
.test-form.visible { display:block; }
.test-form label { font-size:11px; color:var(--text-muted); display:block; margin-bottom:4px; }
.test-form-input {
  width:100%; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; padding:7px 10px; color:var(--text);
  font-size:12px; outline:none; font-family:'Syne',sans-serif;
  margin-bottom:8px; transition:border-color .2s;
}
.test-form-input:focus { border-color:var(--test-color); }
.test-form-row { display:flex; gap:6px; }
.test-save-btn {
  background:var(--test-color); border:none; border-radius:8px;
  padding:7px 14px; color:#fff; font-size:12px; font-weight:700;
  cursor:pointer; font-family:'Syne',sans-serif; white-space:nowrap;
}
.test-cancel-btn {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:7px 10px; color:var(--text-muted); font-size:12px;
  cursor:pointer; font-family:'Syne',sans-serif;
}

/* NOTIFICATION BANNER */
.notif-banner {
  border-radius:14px; padding:12px 14px; margin-bottom:12px;
  display:flex; align-items:flex-start; gap:10px;
}
.notif-banner.warning {
  background:linear-gradient(135deg,rgba(249,115,22,.12),rgba(249,115,22,.04));
  border:1px solid rgba(249,115,22,.3);
}
.notif-banner.info {
  background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(239,68,68,.03));
  border:1px solid rgba(239,68,68,.25);
}
.nb-icon { font-size:20px; flex-shrink:0; }
.nb-text { font-size:12px; color:var(--text); line-height:1.6; }
.nb-text strong { font-weight:700; }

/* NO CLASS */
.no-class { text-align:center; padding:60px 20px; color:var(--text-dim); }
.no-class .emoji { font-size:48px; margin-bottom:12px; }
.no-class h3 { font-size:18px; color:var(--text-muted); margin-bottom:6px; }

/* OVERALL ATTENDANCE SUMMARY */
.att-summary {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:14px 16px; margin-bottom:16px;
}
.att-summary-title { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; font-family:'JetBrains Mono',monospace; margin-bottom:10px; }
.att-course-row {
  display:flex; align-items:center; gap:8px; margin-bottom:7px;
}
.att-course-row:last-child { margin-bottom:0; }
.att-course-name { font-size:12px; font-weight:700; min-width:40px; font-family:'JetBrains Mono',monospace; }
.att-bar-wrap { flex:1; height:6px; background:var(--border); border-radius:4px; overflow:hidden; }
.att-bar-fill { height:100%; border-radius:4px; transition:width .5s ease; }
.att-pct-label { font-size:11px; font-family:'JetBrains Mono',monospace; color:var(--text-muted); min-width:38px; text-align:right; }
.att-count-label { font-size:10px; color:var(--text-dim); }

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px;
  background:rgba(10,10,15,0.92); backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex; padding:10px 20px;
  padding-bottom:calc(12px + var(--safe-bottom));
  z-index:100;
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; color:var(--text-dim);
  cursor:pointer; font-size:10px; font-family:'Syne',sans-serif;
  font-weight:600; transition:color .2s;
}
.nav-icon { font-size:20px; }
.nav-btn.active { color:var(--accent); }

/* WEEKLY VIEW */
.weekly-view,.settings-view { display:none; }
.weekly-view.visible,.settings-view.visible { display:block; }
.today-view.hidden { display:none; }

.section-label {
  font-size:11px; font-weight:700; color:var(--text-dim);
  text-transform:uppercase; letter-spacing:.1em;
  margin-bottom:12px; margin-top:20px;
}
.section-label:first-child { margin-top:0; }

.week-grid { display:flex; flex-direction:column; gap:10px; }
.week-day-row {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:14px 16px; cursor:pointer; transition:all .2s;
}
.week-day-row:hover { border-color:var(--accent); }
.week-day-row.today-row { border-color:var(--accent2); }
.week-day-name {
  font-size:13px; font-weight:800; margin-bottom:8px;
  display:flex; align-items:center; gap:8px;
}
.today-dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); }
.week-classes { display:flex; gap:6px; flex-wrap:wrap; }
.week-chip {
  font-size:11px; font-family:'JetBrains Mono',monospace;
  padding:3px 10px; border-radius:20px;
  background:var(--surface); border:1px solid var(--border);
  color:var(--text-muted);
}
.week-chip.has-test { border-color:rgba(249,115,22,.4); color:var(--test-color); }

/* SETTINGS */
.settings-title { font-size:20px; font-weight:800; margin-bottom:16px; }
.settings-section { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:14px; }
.settings-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background .2s;
}
.settings-item:last-child { border-bottom:none; }
.settings-item:hover { background:var(--surface); }
.settings-item-left { display:flex; align-items:center; gap:12px; }
.s-icon {
  width:36px; height:36px; border-radius:10px;
  background:var(--surface); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:18px;
}
.s-label { font-size:14px; font-weight:600; }
.s-sub { font-size:11px; color:var(--text-muted); margin-top:1px; }
.s-arrow { color:var(--text-dim); font-size:16px; }

.upload-area {
  border:2px dashed var(--border); border-radius:14px;
  padding:24px; text-align:center; cursor:pointer;
  transition:all .2s; background:var(--card); margin-bottom:14px;
}
.upload-area:hover { border-color:var(--accent); background:rgba(124,58,237,0.04); }
.upload-area .u-icon { font-size:32px; margin-bottom:8px; }
.upload-area .u-text { font-size:13px; color:var(--text-muted); }

.teacher-list { display:flex; flex-direction:column; gap:10px; }
.teacher-item {
  display:flex; align-items:center; gap:12px;
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:12px 14px;
}
.t-pic-wrap {
  width:44px; height:44px; border-radius:12px;
  background:var(--surface); border:1px solid var(--border);
  overflow:hidden; cursor:pointer; position:relative;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.t-pic-wrap img { width:100%; height:100%; object-fit:cover; display:none; }
.t-pic-wrap::after {
  content:'📷'; position:absolute; inset:0;
  background:rgba(0,0,0,0); display:flex; align-items:center;
  justify-content:center; font-size:14px; border-radius:12px;
  opacity:0; transition:all .2s;
}
.t-pic-wrap:hover::after { background:rgba(0,0,0,0.6); opacity:1; }
.t-initials { font-size:13px; font-weight:800; color:var(--accent); }
.t-info { flex:1; }
.t-code { font-size:14px; font-weight:800; }
.t-name { font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; }

input[type="file"] { display:none; }
</style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="profile-section">
      <div class="profile-pic" id="myProfilePic" onclick="triggerProfileUpload()">
        <img id="myProfileImg" src="" alt="">
        <span class="ph">👤</span>
      </div>
      <div class="profile-info">
        <h1>2A Batch</h1>
        <p>Spring 2026</p>
      </div>
    </div>
    <div class="date-badge">
      <div class="day-name" id="todayDayName">—</div>
      <div class="date-str" id="todayDateStr">—</div>
    </div>
  </div>

  <!-- HIDDEN FILE INPUTS -->
  <input type="file" id="profileInput" accept="image/*" capture="user" onchange="handleProfileUpload(event)">
  <input type="file" id="teacherInput" accept="image/*" capture="user" onchange="handleTeacherUpload(event)">

  <!-- TODAY VIEW -->
  <div class="today-view" id="todayView">
    <div id="installBanner"></div>
    <div id="notifReqArea"></div>
    <div id="notifBannerArea"></div>

    <div class="day-selector" id="daySelector"></div>

    <div class="status-bar">
      <div class="stat-card">
        <div class="stat-label">আজকের ক্লাস</div>
        <div class="stat-val" id="classTodayCount">0 <span>টি</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">এই দিন উপস্থিতি</div>
        <div class="stat-val" id="dayAttPct" style="color:var(--green)">— <span>%</span></div>
      </div>
    </div>

    <div class="day-header">
      <div class="day-title" id="viewDayTitle">—</div>
      <div class="room-badge" id="viewRoomBadge">—</div>
    </div>

    <div id="classListArea"></div>
  </div>

  <!-- WEEKLY VIEW -->
  <div class="weekly-view" id="weeklyView">
    <div class="section-label">সাপ্তাহিক রুটিন</div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- ATTENDANCE VIEW -->
  <div class="weekly-view" id="attendanceView">
    <div class="section-label">কোর্সভিত্তিক উপস্থিতি</div>
    <div class="att-summary" id="globalAttSummary"></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div class="settings-view" id="settingsView">
    <div class="settings-title">সেটিংস</div>
    <div class="section-label">আমার প্রোফাইল</div>
    <div class="upload-area" onclick="triggerProfileUpload()">
      <div id="settingsProfilePreview"><div class="u-icon">👤</div></div>
      <div class="u-text">ছবি তুলুন বা গ্যালারি থেকে বাছুন</div>
    </div>
    <div class="section-label">স্যারদের ছবি</div>
    <div class="teacher-list" id="teacherListSettings"></div>
    <div class="section-label" style="margin-top:24px;">অন্যান্য</div>
    <div class="settings-section">
      <div class="settings-item" onclick="requestNotifPermission()">
        <div class="settings-item-left">
          <div class="s-icon">🔔</div>
          <div><div class="s-label">নোটিফিকেশন চালু করুন</div><div class="s-sub" id="notifStatus">অনুমতি প্রয়োজন</div></div>
        </div>
        <div class="s-arrow">›</div>
      </div>
      <div class="settings-item" onclick="clearAllData()">
        <div class="settings-item-left">
          <div class="s-icon">🗑️</div>
          <div><div class="s-label">সব ডেটা মুছুন</div><div class="s-sub">রিসেট করুন</div></div>
        </div>
        <div class="s-arrow">›</div>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="navToday" onclick="switchView('today')">
    <span class="nav-icon">📅</span>আজকে
  </button>
  <button class="nav-btn" id="navWeekly" onclick="switchView('weekly')">
    <span class="nav-icon">📆</span>রুটিন
  </button>
  <button class="nav-btn" id="navAtt" onclick="switchView('attendance')">
    <span class="nav-icon">📊</span>উপস্থিতি
  </button>
  <button class="nav-btn" id="navSettings" onclick="switchView('settings')">
    <span class="nav-icon">⚙️</span>সেটিংস
  </button>
</div>

<script>
// ─────────────── DATA ───────────────────────────────────────────────────────
const ROUTINE = {
  0: { name:'রবিবার',    room:'102', classes:[
    { code:'MEL', teacher:'MMU', time:'11:30 – 12:40' },
    { code:'NGW', teacher:'UM',  time:'12:45 – 1:55'  },
  ]},
  1: { name:'সোমবার',   room:'105', classes:[
    { code:'EWS', teacher:'KS',  time:'11:30 – 12:40' },
    { code:'BWS', teacher:'ARF', time:'12:45 – 1:55'  },
  ]},
  2: { name:'মঙ্গলবার', room:'103', classes:[
    { code:'CBA', teacher:'ARF', time:'11:30 – 12:40' },
    { code:'EWS', teacher:'KS',  time:'12:45 – 1:55'  },
  ]},
  3: { name:'বুধবার',   room:'102', classes:[
    { code:'MMB', teacher:'KS',  time:'9:00 – 10:10'  },
    { code:'BWS', teacher:'ARF', time:'10:15 – 11:25' },
    { code:'MEL', teacher:'MMU', time:'11:30 – 12:40' },
  ]},
  4: { name:'বৃহস্পতিবার', room:'102', classes:[
    { code:'NGW', teacher:'UM',  time:'9:00 – 10:10'  },
    { code:'MMB', teacher:'KS',  time:'10:15 – 11:25' },
    { code:'CBA', teacher:'ARF', time:'11:30 – 12:40' },
  ]},
};

// All unique courses and their total occurrences per week
function getCourseStats() {
  const stats = {};
  for (let d=0; d<=4; d++) {
    ROUTINE[d].classes.forEach((cls,i) => {
      if (!stats[cls.code]) stats[cls.code] = { total:0, attended:0, missed:0 };
      stats[cls.code].total++;
      const k = `${d}_${i}`;
      if (state.attendance[k] === true) stats[cls.code].attended++;
      if (state.attendance[k] === false) stats[cls.code].missed++;
    });
  }
  return stats;
}

function jsToRoutineDay(jsDay) {
  return [0,1,2,3,4].includes(jsDay) ? jsDay : null;
  // Sun=0,Mon=1,Tue=2,Wed=3,Thu=4 — JS matches!
}

// ─────────────── STATE ──────────────────────────────────────────────────────
let state = loadState();
const today = new Date();
const todayJsDay = today.getDay();
const todayRoutineDay = jsToRoutineDay(todayJsDay);
let selectedDay = todayRoutineDay !== null ? todayRoutineDay : 0;
let currentView = 'today';
let deferredInstallPrompt = null;
let currentTeacherCode = null;

function loadState() {
  try {
    const s = localStorage.getItem('routine_state_2a_v2');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return { attendance:{}, notes:{}, tests:{}, teacherPics:{}, profilePic:null };
}
function saveState() {
  try { localStorage.setItem('routine_state_2a_v2', JSON.stringify(state)); } catch(e) {}
}

// ─────────────── INIT ───────────────────────────────────────────────────────
function init() {
  registerSW();
  setupInstallPrompt();

  // Date display
  const dayNames = ['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];
  document.getElementById('todayDayName').textContent = dayNames[todayJsDay];
  document.getElementById('todayDateStr').textContent =
    today.toLocaleDateString('bn-BD', { day:'numeric', month:'short', year:'numeric' });

  // Profile pic
  if (state.profilePic) restoreProfilePic(state.profilePic);

  buildDaySelector();
  renderTodayView(selectedDay);
  buildWeekGrid();
  buildAttendanceSummary();
  buildTeacherSettings();
  renderNotifBanners();
  checkNotifPermission();
  scheduleNotifications();
}

// ─────────────── SERVICE WORKER ─────────────────────────────────────────────
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

// ─────────────── INSTALL PWA ────────────────────────────────────────────────
function setupInstallPrompt() {
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    showInstallBanner();
  });
  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').innerHTML = '';
  });
}

function showInstallBanner() {
  const area = document.getElementById('installBanner');
  area.innerHTML = `
    <div class="install-banner" onclick="installApp()">
      <span class="ib-icon">📲</span>
      <div class="ib-text">এই অ্যাপটি ফোনে <strong>ইন্সটল</strong> করুন — হোম স্ক্রিনে রাখুন, অফলাইনেও চলবে!</div>
      <span class="ib-close" onclick="event.stopPropagation(); this.closest('.install-banner').remove()">×</span>
    </div>`;
}

async function installApp() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  document.getElementById('installBanner').innerHTML = '';
}

// ─────────────── NOTIFICATIONS ──────────────────────────────────────────────
function checkNotifPermission() {
  if (!('Notification' in window)) return;
  const area = document.getElementById('notifReqArea');
  const statusEl = document.getElementById('notifStatus');

  if (Notification.permission === 'default') {
    area.innerHTML = `
      <button class="notif-request-btn" onclick="requestNotifPermission()">
        🔔 টেস্টের নোটিফিকেশন পেতে অনুমতি দিন
      </button>`;
  } else if (Notification.permission === 'granted') {
    area.innerHTML = '';
    if (statusEl) statusEl.textContent = '✅ চালু আছে';
  } else {
    if (statusEl) statusEl.textContent = '❌ অনুমতি নেই';
  }
}

async function requestNotifPermission() {
  if (!('Notification' in window)) return alert('এই ব্রাউজারে নোটিফিকেশন সাপোর্ট নেই।');
  const perm = await Notification.requestPermission();
  checkNotifPermission();
  if (perm === 'granted') {
    scheduleNotifications();
    new Notification('Routine 2A 🎓', { body: 'নোটিফিকেশন চালু হয়েছে!', icon:'./icons/icon-192.png' });
  }
}

function scheduleNotifications() {
  if (Notification.permission !== 'granted') return;

  // Clear old timers
  if (window._notifTimers) window._notifTimers.forEach(clearTimeout);
  window._notifTimers = [];

  const now = new Date();

  // For each test, schedule notification on that day at 8:00 AM and previous day at 8 PM
  Object.keys(state.tests).forEach(key => {
    (state.tests[key] || []).forEach(test => {
      if (!test.date || !test.topic) return;

      const testDate = new Date(test.date);
      testDate.setHours(0,0,0,0);

      // Same day 8:00 AM
      const sameDayNotif = new Date(testDate);
      sameDayNotif.setHours(8, 0, 0, 0);
      scheduleNotif(sameDayNotif, `🧪 আজ ক্লাস টেস্ট!`, `${test.code} — ${test.topic}`, key);

      // Previous day 8:00 PM
      const prevDay = new Date(testDate);
      prevDay.setDate(prevDay.getDate() - 1);
      prevDay.setHours(20, 0, 0, 0);
      scheduleNotif(prevDay, `⚠️ আগামীকাল ক্লাস টেস্ট!`, `${test.code} — ${test.topic}`, key+'_prev');
    });
  });
}

function scheduleNotif(dateObj, title, body, tag) {
  const delay = dateObj - Date.now();
  if (delay > 0 && delay < 7 * 24 * 60 * 60 * 1000) {
    const t = setTimeout(() => {
      new Notification(title, { body, icon:'./icons/icon-192.png', tag });
    }, delay);
    window._notifTimers.push(t);
  }
}

function renderNotifBanners() {
  const area = document.getElementById('notifBannerArea');
  area.innerHTML = '';
  if (!state.tests) return;

  const todayStr = toDateStr(today);
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
  const tomorrowStr = toDateStr(tomorrow);

  Object.keys(state.tests).forEach(key => {
    (state.tests[key] || []).forEach(test => {
      if (!test.date) return;
      if (test.date === todayStr) {
        area.innerHTML += `
          <div class="notif-banner info">
            <span class="nb-icon">🔔</span>
            <div class="nb-text">আজ <strong>${test.code}</strong> ক্লাসে টেস্ট আছে!<br>বিষয়: <strong>${esc(test.topic)}</strong></div>
          </div>`;
      } else if (test.date === tomorrowStr) {
        area.innerHTML += `
          <div class="notif-banner warning">
            <span class="nb-icon">⚠️</span>
            <div class="nb-text">আগামীকাল <strong>${test.code}</strong> ক্লাসে টেস্ট আছে!<br>বিষয়: <strong>${esc(test.topic)}</strong></div>
          </div>`;
      }
    });
  });
}

// ─────────────── DAY SELECTOR ───────────────────────────────────────────────
function buildDaySelector() {
  const wrap = document.getElementById('daySelector');
  wrap.innerHTML = '';
  for (let d=0; d<=4; d++) {
    const btn = document.createElement('button');
    btn.className = 'day-btn'
      + (d === todayRoutineDay ? ' today-marker' : '')
      + (d === selectedDay ? ' active' : '');
    btn.textContent = ROUTINE[d].name;
    btn.onclick = () => selectDay(d);
    wrap.appendChild(btn);
  }
}
function selectDay(d) {
  selectedDay = d;
  buildDaySelector();
  renderTodayView(d);
}

// ─────────────── TODAY VIEW ──────────────────────────────────────────────────
function renderTodayView(d) {
  const day = ROUTINE[d];
  document.getElementById('viewDayTitle').textContent = day.name;
  document.getElementById('viewRoomBadge').textContent = 'Room ' + day.room;
  document.getElementById('classTodayCount').innerHTML = day.classes.length + ' <span>টি</span>';

  // Day attendance %
  let att=0, total=day.classes.length;
  day.classes.forEach((_,i) => { if (state.attendance[`${d}_${i}`] === true) att++; });
  const pct = total > 0 ? Math.round(att/total*100) : 0;
  document.getElementById('dayAttPct').innerHTML = pct + ' <span>%</span>';

  const area = document.getElementById('classListArea');
  area.innerHTML = '';
  day.classes.forEach((cls, i) => area.appendChild(buildClassCard(d, i, cls)));
}

function buildClassCard(d, i, cls) {
  const key = `${d}_${i}`;
  const attended = state.attendance[key];
  const notes = state.notes[key] || '';
  const tests = state.tests[key] || [];

  // Per-course attendance
  const courseStats = getCourseStat(cls.code);
  const cpct = courseStats.total > 0 ? Math.round(courseStats.attended / courseStats.total * 100) : 0;
  const barColor = cpct >= 75 ? 'var(--green)' : cpct >= 60 ? 'var(--accent3)' : 'var(--red)';

  // Teacher pic
  const tpic = state.teacherPics[cls.teacher];
  const tpicHtml = tpic
    ? `<img src="${tpic}" style="display:block;">`
    : `<span class="teacher-initials">${cls.teacher}</span>`;

  // Test badges
  const testBadges = tests.map((t,ti) => `
    <span class="test-badge">🧪 ${esc(t.topic || t)} <span style="font-size:10px;color:var(--text-dim)">${t.date ? '('+fmtDate(t.date)+')' : ''}</span>
      <span class="del-test" onclick="delTest('${key}',${ti})">×</span>
    </span>`).join('');

  const card = document.createElement('div');
  card.className = 'class-card'
    + (attended===true ? ' attended' : attended===false ? ' missed' : '')
    + (tests.length>0 ? ' has-test' : '');

  card.innerHTML = `
    <div class="class-top">
      <div class="teacher-pic" onclick="triggerTeacherUpload('${cls.teacher}')">${tpicHtml}</div>
      <div class="class-info">
        <div class="class-code">${cls.code}</div>
        <div class="class-teacher">${cls.teacher}</div>
        <div class="class-time">⏱ ${cls.time}</div>
        <div>${testBadges}</div>
      </div>
      <div class="attend-controls">
        <button class="attend-btn ${attended===true?'attended':attended===false?'missed':''}"
          onclick="toggleAttend('${key}',event)">
          ${attended===true?'✅':attended===false?'❌':'○'}
        </button>
        <div class="attend-count">${courseStats.attended}/${courseStats.total}</div>
      </div>
    </div>
    <div class="course-att-bar">
      <div class="course-att-row">
        <span class="course-att-label">${cls.code}</span>
        <div class="bar-wrap"><div class="bar-fill" style="width:${cpct}%;background:${barColor}"></div></div>
        <span class="bar-pct">${cpct}%</span>
      </div>
    </div>
    <div class="notes-section">
      <button class="notes-toggle" onclick="toggleNotes('${key}')">
        📝 <span id="ntl_${key}">${notes ? 'নোট দেখুন' : 'নোট যোগ করুন'}</span>
      </button>
      <div id="nta_${key}" style="display:${notes?'block':'none'}">
        <textarea class="notes-input" placeholder="গুরুত্বপূর্ণ টপিক লিখুন..."
          onchange="saveNote('${key}',this.value)">${esc(notes)}</textarea>
      </div>
      <button class="add-test-btn" onclick="toggleTestForm('${key}')">🧪 ক্লাস টেস্ট যোগ করুন</button>
      <div class="test-form" id="tf_${key}">
        <label>টেস্টের তারিখ</label>
        <input type="date" class="test-form-input" id="td_${key}" value="${getTodayDateStr()}">
        <label>বিষয় / টপিক</label>
        <input type="text" class="test-form-input" id="tt_${key}" placeholder="যেমন: Chapter 3, Arrays">
        <div class="test-form-row">
          <button class="test-save-btn" onclick="addTest('${key}','${cls.code}')">যোগ করুন</button>
          <button class="test-cancel-btn" onclick="toggleTestForm('${key}')">বাতিল</button>
        </div>
      </div>
    </div>`;
  return card;
}

function getCourseStat(code) {
  let total=0, attended=0, missed=0;
  for (let d=0; d<=4; d++) {
    ROUTINE[d].classes.forEach((cls,i) => {
      if (cls.code !== code) return;
      total++;
      const k = `${d}_${i}`;
      if (state.attendance[k] === true) attended++;
      if (state.attendance[k] === false) missed++;
    });
  }
  return { total, attended, missed };
}

function toggleAttend(key, e) {
  e.stopPropagation();
  const curr = state.attendance[key];
  if (curr===true) state.attendance[key] = false;
  else if (curr===false) delete state.attendance[key];
  else state.attendance[key] = true;
  saveState();
  renderTodayView(selectedDay);
  buildAttendanceSummary();
}

function toggleNotes(key) {
  const a = document.getElementById('nta_'+key);
  const l = document.getElementById('ntl_'+key);
  if (a.style.display==='none') { a.style.display='block'; l.textContent='নোট লুকান'; }
  else { a.style.display='none'; l.textContent='নোট দেখুন'; }
}

function saveNote(key, val) {
  if (val.trim()) state.notes[key] = val.trim();
  else delete state.notes[key];
  saveState();
}

function toggleTestForm(key) {
  document.getElementById('tf_'+key).classList.toggle('visible');
}

function addTest(key, code) {
  const dateVal = document.getElementById('td_'+key).value;
  const topicVal = document.getElementById('tt_'+key).value.trim();
  if (!topicVal) { alert('টপিক লিখুন!'); return; }
  if (!state.tests[key]) state.tests[key] = [];
  state.tests[key].push({ date: dateVal, topic: topicVal, code });
  saveState();
  renderTodayView(selectedDay);
  buildWeekGrid();
  renderNotifBanners();
  scheduleNotifications();
}

function delTest(key, idx) {
  state.tests[key].splice(idx, 1);
  if (!state.tests[key].length) delete state.tests[key];
  saveState();
  renderTodayView(selectedDay);
  buildWeekGrid();
  renderNotifBanners();
}

// ─────────────── WEEKLY VIEW ─────────────────────────────────────────────────
function buildWeekGrid() {
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';
  for (let d=0; d<=4; d++) {
    const day = ROUTINE[d];
    const isToday = d === todayRoutineDay;
    const row = document.createElement('div');
    row.className = 'week-day-row' + (isToday?' today-row':'');
    row.onclick = () => { switchView('today'); selectDay(d); };

    const chips = day.classes.map((cls,i) => {
      const hasTest = (state.tests[`${d}_${i}`]||[]).length > 0;
      return `<span class="week-chip${hasTest?' has-test':''}">${cls.code}${hasTest?' 🧪':''}</span>`;
    }).join('');

    row.innerHTML = `
      <div class="week-day-name">
        ${isToday?'<span class="today-dot"></span>':''}
        ${day.name}
        <span style="font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-weight:400">Room ${day.room}</span>
      </div>
      <div class="week-classes">${chips}</div>`;
    grid.appendChild(row);
  }
}

// ─────────────── ATTENDANCE SUMMARY ─────────────────────────────────────────
function buildAttendanceSummary() {
  const el = document.getElementById('globalAttSummary');
  const courses = ['MEL','NGW','EWS','BWS','CBA','MMB'];
  const colors = { MEL:'#7c3aed', NGW:'#06b6d4', EWS:'#10b981', BWS:'#f59e0b', CBA:'#f97316', MMB:'#ec4899' };
  el.innerHTML = '<div class="att-summary-title">কোর্সভিত্তিক উপস্থিতির হিসাব</div>';

  courses.forEach(code => {
    const s = getCourseStat(code);
    const pct = s.total > 0 ? Math.round(s.attended/s.total*100) : 0;
    const color = pct >= 75 ? 'var(--green)' : pct >= 60 ? 'var(--accent3)' : 'var(--red)';
    el.innerHTML += `
      <div class="att-course-row">
        <span class="att-course-name">${code}</span>
        <div class="att-bar-wrap"><div class="att-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <span class="att-pct-label">${pct}%</span>
      </div>
      <div class="att-count-label" style="margin-left:48px;margin-bottom:6px;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace">${s.attended} উপস্থিত / ${s.total} মোট</div>`;
  });
}

// ─────────────── TEACHER SETTINGS ────────────────────────────────────────────
const TEACHERS = ['MMU','UM','KS','ARF'];
function buildTeacherSettings() {
  const list = document.getElementById('teacherListSettings');
  list.innerHTML = '';
  TEACHERS.forEach(code => {
    const pic = state.teacherPics[code];
    const item = document.createElement('div');
    item.className = 'teacher-item';
    item.innerHTML = `
      <div class="t-pic-wrap" onclick="triggerTeacherUpload('${code}')">
        <img src="${pic||''}" style="display:${pic?'block':'none'}">
        <span class="t-initials" style="display:${pic?'none':'flex'}">${code}</span>
      </div>
      <div class="t-info"><div class="t-code">${code}</div><div class="t-name">ক্লিক করে ছবি দিন</div></div>`;
    list.appendChild(item);
  });
}

// ─────────────── PHOTO UPLOAD ────────────────────────────────────────────────
function triggerProfileUpload() { document.getElementById('profileInput').click(); }
function handleProfileUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    state.profilePic = ev.target.result; saveState();
    restoreProfilePic(ev.target.result);
  };
  r.readAsDataURL(file);
  e.target.value = '';
}
function restoreProfilePic(src) {
  const img = document.getElementById('myProfileImg');
  img.src = src; img.style.display='block';
  document.querySelector('#myProfilePic .ph').style.display='none';
  document.getElementById('settingsProfilePreview').innerHTML =
    `<img src="${src}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;margin-bottom:8px">`;
}

function triggerTeacherUpload(code) {
  currentTeacherCode = code;
  document.getElementById('teacherInput').click();
}
function handleTeacherUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    state.teacherPics[currentTeacherCode] = ev.target.result; saveState();
    renderTodayView(selectedDay);
    buildTeacherSettings();
  };
  r.readAsDataURL(file);
  e.target.value = '';
}

// ─────────────── VIEW SWITCHING ──────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  document.getElementById('todayView').classList.toggle('hidden', v!=='today');
  document.getElementById('weeklyView').classList.toggle('visible', v==='weekly');
  document.getElementById('attendanceView').classList.toggle('visible', v==='attendance');
  document.getElementById('settingsView').classList.toggle('visible', v==='settings');
  ['navToday','navWeekly','navAtt','navSettings'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  const map = {today:'navToday',weekly:'navWeekly',attendance:'navAtt',settings:'navSettings'};
  document.getElementById(map[v]).classList.add('active');
  if (v==='attendance') buildAttendanceSummary();
}

// ─────────────── UTILS ───────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toDateStr(d) {
  return d.toISOString().split('T')[0];
}
function getTodayDateStr() { return toDateStr(today); }
function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return d.toLocaleDateString('bn-BD',{day:'numeric',month:'short'});
}

function clearAllData() {
  if (!confirm('সব অ্যাটেন্ডেন্স, নোটস এবং টেস্ট মুছবেন?')) return;
  state.attendance={}; state.notes={}; state.tests={};
  saveState();
  renderTodayView(selectedDay);
  buildWeekGrid();
  buildAttendanceSummary();
  renderNotifBanners();
  alert('মুছে ফেলা হয়েছে ✓');
}

// ─────────────── START ───────────────────────────────────────────────────────
init();
</script>
